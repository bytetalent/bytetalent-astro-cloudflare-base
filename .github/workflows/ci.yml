name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # bun install (no --frozen-lockfile) — once a developer runs install
      # locally and commits bun.lockb, switch to: bun install --frozen-lockfile
      - name: Install dependencies
        run: bun install

      - name: Astro check (typecheck)
        run: bun run check

      - name: Format check
        run: bun run format:check

      - name: Build
        run: bun run build
        env:
          # Build doesn't need real values — Astro reads runtime env via
          # locals.runtime.env on Cloudflare Workers. These satisfy any
          # build-time access via import.meta.env.
          PUBLIC_SITE_URL: https://marketing.bytetalent.com
